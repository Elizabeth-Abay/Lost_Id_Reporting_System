<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | AAU Lost ID Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    :root {
      --primary-blue: #1e3a8a;
      --dark-blue: #0f1a3f;
      --light-blue: #3b82f6;
      --accent-blue: #60a5fa;
      --white: #ffffff;
      --off-white: #f8fafc;
      --gray: #94a3b8;
      --light-gray: #e2e8f0;
      --black: #0f172a;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 15px 35px rgba(0, 0, 0, 0.12);
    }

    body {
      background: linear-gradient(135deg, var(--off-white), #e0f2fe);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Background Elements */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, var(--light-blue), transparent);
      opacity: 0.08;
      z-index: -1;
      filter: blur(25px);
    }

    .shape-1 {
      width: 300px;
      height: 300px;
      top: -100px;
      left: -100px;
      animation: float 20s ease-in-out infinite;
    }

    .shape-2 {
      width: 400px;
      height: 400px;
      bottom: -150px;
      right: -150px;
      animation: float 25s ease-in-out infinite reverse;
      background: radial-gradient(circle, var(--primary-blue), transparent);
    }

    /* Main Container */
    .main {
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }

    .container {
      background: var(--white);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: var(--shadow-lg), 0 20px 60px rgba(15, 26, 63, 0.1);
      transform-style: preserve-3d;
      transition: transform 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .container:hover {
      transform: translateY(-5px);
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, var(--primary-blue), var(--accent-blue));
    }

    /* Header */
    .logo-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary-blue), var(--light-blue));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      box-shadow: var(--shadow-md);
    }

    h2 {
      color: var(--dark-blue);
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--gray);
      text-align: center;
      margin-bottom: 36px;
      font-size: 1.1rem;
    }

    /* Forms */
    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Form Groups */
    .form-group {
      position: relative;
    }

    .form-label {
      display: block;
      color: var(--dark-blue);
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .form-label i {
      color: var(--light-blue);
      margin-right: 6px;
    }

    select,
    input {
      width: 100%;
      padding: 16px 18px;
      border: 2px solid var(--light-gray);
      border-radius: 12px;
      font-size: 1rem;
      color: var(--black);
      background-color: var(--white);
      transition: all 0.3s ease;
    }

    select:focus,
    input:focus {
      outline: none;
      border-color: var(--light-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      transform: translateY(-2px);
    }

    select:disabled {
      background-color: #f8fafc;
      color: var(--gray);
      cursor: not-allowed;
    }

    /* Role Badge */
    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(30, 58, 138, 0.05));
      padding: 12px 20px;
      border-radius: 12px;
      margin-bottom: 10px;
      border: 2px solid rgba(59, 130, 246, 0.2);
    }

    .role-badge i {
      color: var(--primary-blue);
      font-size: 1.2rem;
    }

    .role-badge span {
      color: var(--dark-blue);
      font-weight: 600;
    }

    /* Buttons */
    button {
      padding: 18px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      background: linear-gradient(135deg, var(--primary-blue), var(--light-blue));
      color: white;
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
    }

    button:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
      background: linear-gradient(135deg, var(--dark-blue), var(--primary-blue));
    }

    button:active:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    /* OTP Form Styles */
    #otpForm {
      animation: fadeIn 0.5s ease-out;
    }

    .otp-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .otp-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--success), #34d399);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
    }

    .otp-info {
      color: var(--gray);
      margin-bottom: 24px;
      line-height: 1.6;
      text-align: center;
      font-size: 0.95rem;
    }

    .otp-input-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
    }

    .otp-digit {
      width: 60px;
      height: 70px;
      border: 2px solid var(--light-gray);
      border-radius: 12px;
      font-size: 2rem;
      text-align: center;
      font-weight: 700;
      color: var(--dark-blue);
      transition: all 0.3s ease;
      background: white;
    }

    .otp-digit:focus {
      outline: none;
      border-color: var(--light-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      transform: translateY(-3px);
    }

    /* OTP Timer */
    .otp-timer {
      text-align: center;
      margin: 20px 0;
      padding: 12px;
      border-radius: 12px;
      background: rgba(59, 130, 246, 0.05);
      border: 2px solid rgba(59, 130, 246, 0.1);
    }

    .timer-text {
      font-weight: 600;
      color: var(--dark-blue);
    }

    .timer {
      font-weight: 700;
      color: var(--primary-blue);
      font-size: 1.2rem;
      margin-left: 5px;
    }

    .timer-expired {
      color: var(--error) !important;
    }

    /* OTP Buttons Container */
    .otp-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 30px;
    }

    #verifyBtn {
      background: linear-gradient(135deg, var(--success), #34d399);
    }

    #verifyBtn:hover:not(:disabled) {
      background: linear-gradient(135deg, #059669, #10b981);
    }

    #resendOtpBtn {
      background: linear-gradient(135deg, var(--warning), #fbbf24);
    }

    #resendOtpBtn:hover:not(:disabled) {
      background: linear-gradient(135deg, #d97706, #f59e0b);
    }

    #resetOtpBtn {
      background: linear-gradient(135deg, var(--gray), #94a3b8);
    }

    #resetOtpBtn:hover {
      background: linear-gradient(135deg, #64748b, #94a3b8);
    }

    /* Login Link */
    .login-link {
      text-align: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 2px solid var(--light-gray);
      color: var(--gray);
    }

    .login-link a {
      color: var(--light-blue);
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .login-link a:hover {
      color: var(--primary-blue);
      text-decoration: underline;
    }

    /* Status Messages */
    .status-message {
      padding: 14px;
      border-radius: 12px;
      margin: 16px 0;
      text-align: center;
      font-weight: 500;
      display: none;
      animation: slideIn 0.3s ease-out;
    }

    .success {
      background: rgba(16, 185, 129, 0.1);
      border: 2px solid rgba(16, 185, 129, 0.3);
      color: var(--success);
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 2px solid rgba(239, 68, 68, 0.3);
      color: var(--error);
    }

    .info {
      background: rgba(59, 130, 246, 0.1);
      border: 2px solid rgba(59, 130, 246, 0.3);
      color: var(--light-blue);
    }

    /* Animations */
    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      33% {
        transform: translate(30px, -30px) rotate(5deg);
      }

      66% {
        transform: translate(-20px, 20px) rotate(-5deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }
    }

    /* Responsive Design */
    @media (max-width: 600px) {
      .main {
        padding: 15px;
      }

      .container {
        padding: 36px 24px;
      }

      h2 {
        font-size: 1.8rem;
      }

      .otp-digit {
        width: 50px;
        height: 60px;
        font-size: 1.8rem;
      }

      button {
        padding: 16px;
      }
    }

    @media (max-width: 400px) {
      .container {
        padding: 30px 20px;
      }

      .otp-digit {
        width: 45px;
        height: 55px;
        font-size: 1.6rem;
      }

      .logo-header {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <!-- Background Shapes -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <div class="main">
    <div class="container">
      <!-- Header -->
      <div class="logo-header">
        <div class="logo-icon">
          <i class="fas fa-id-card"></i>
        </div>
        <div>
          <h2>Create Account</h2>
          <p class="subtitle">Sign up once. Login anytime.</p>
        </div>
      </div>

      <!-- Status Messages -->
      <div id="statusMessage" class="status-message"></div>

      <!-- SIGNUP FORM -->
      <form id="signupForm">
        <div class="role-badge">
          <i class="fas fa-user-graduate"></i>
          <span>Sign Up </span>
          <i class="fas fa-lock" style="margin-left: auto;"></i>
        </div>

        <!-- Role Selection -->

        <div class="roles">
          <div class="select-wrapper">
            <select id="Role" class="jsRole" name="role">
              <option value="Student">Student</option>
              <option value="Library">Library</option>
              <option value="Registral">Registral</option>
              <option value="Book-Store">Book Store</option>
              <option value="Campus-Police">Campus Police</option>
              <option value="Finance">Finance </option>
            </select>
          </div>
          <div class="js-staff"></div>
        </div>

        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-id-badge"></i> ID
          </label>
          <input type="text" name = "id" id="studentId" placeholder="e.g., UGR/1234/14" required name="id" />
        </div>

        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-envelope"></i> Email
          </label>
          <input type="email" name = "email" id="email" placeholder="xyz@aau.edu.et" required name="email" />
        </div>

        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-key"></i> Password
          </label>
          <input type="password" name = "password" id="password" placeholder="Minimum 6 characters" required minlength="6" />
        </div>

        <button type="submit" id="sendOtpBtn">
          <i class="fas fa-paper-plane"></i> Send OTP
        </button>
      </form>

      <!-- OTP FORM -->
      <form id="otpForm" style="display:none;">
        <div class="otp-header">
          <div class="otp-icon">
            <i class="fas fa-shield-alt"></i>
          </div>
          <h3>Verify Your Email</h3>
        </div>

        <p class="otp-info">
          We've sent a 6-digit verification code to<br>
          <strong id="userEmail"></strong>
        </p>

        <!-- OTP Input Digits -->
        <div class="otp-input-container">
          <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-index="0" autofocus>
          <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-index="1">
          <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-index="2">
          <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-index="3">
          <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-index="4">
          <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-index="5">
        </div>

        <!-- Hidden OTP Input for Form Submission -->
        <input type="hidden" id="otpInput">

        <!-- Timer -->
        <div class="otp-timer">
          <span class="timer-text">Code expires in</span>
          <span class="timer" id="otpTimer">02:00</span>
        </div>

        <!-- OTP Action Buttons -->
        <div class="otp-buttons">
          <button type="submit" id="verifyBtn">
            <i class="fas fa-check-circle"></i> Verify & Create Account
          </button>

          <button type="button" id="resendOtpBtn" disabled>
            <i class="fas fa-redo"></i> Resend OTP (60s)
          </button>

          <button type="button" id="resetOtpBtn">
            <i class="fas fa-undo"></i> Back to Sign Up
          </button>
        </div>
      </form>

      <!-- Login Link -->
      <div class="login-link">
        Already registered?
        <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login to your account</a>
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>

</html>
