<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost ID Request | AAU Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/logIn.css">
    <script src = "../js/logInLinker.js" type="module"></script>
</head>

<body>
    <!-- Background 3D Shapes -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <div class="main">
        <!-- Left Side - Branding -->
        <div class="word">
            <div class="logo-container">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-id-card"></i>
                    </div>
                    <div class="logo-text">AAU Tracker</div>
                </div>
                <div class="slogan">No more long queues!</div>
                <div class="sub-slogan">Replace your lost ID the smart way with our automated system.</div>
            </div>

            <div class="features">
                <div class="feature">
                    <div class="feature-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <div>Fast & Automated Process</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div>Secure Identity Verification</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div>Lost and Found ID Matching</div>
                </div>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="container">
            <h2 class="welcome-text">Lost ID Request</h2>
            <p class="sub-text">Log in to report or track your lost ID card</p>

            <form id="loginForm">

                <!-- <div class="form-group">
                    <input class="js-id" type="text" id="ID" placeholder="University ID" required>
                </div> -->

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" name="email" id="email" placeholder="xyz@aau.edu.et" required />
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-key"></i> Password
                    </label>
                    <input type="password" name="password" id="password" placeholder="Minimum 6 characters" required
                        minlength="6" />
                </div>

                <div class="buttons-wrapper">
                    <button id="reset" type="button">Reset</button>
                    <button id="login" type="submit" class="js-login">Login</button>
                </div>

                <p id="rep">Found someone's ID?</p>
                <a href="reportFound.html" target="_blank" id="report">Report Here</a>
            </form>
        </div>
    </div>
</body>

</html>
