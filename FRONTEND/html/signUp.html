<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | AAU Lost ID Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/signUp.css">
    <script src = "../js/signUpLinker.js" type="module"></script>
</head>

<body>
    <!-- Background Shapes -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="main">
        <div class="container">
            <!-- Header -->
            <div class="logo-header">
                <div class="logo-icon">
                    <i class="fas fa-id-card"></i>
                </div>
                <div>
                    <h2>Create Account</h2>
                    <p class="subtitle">Sign up once. Login anytime.</p>
                </div>
            </div>

            <!-- Status Messages -->
            <div id="statusMessage" class="status-message"></div>

            <!-- SIGNUP FORM -->
            <form id="signupForm">
                <div class="role-badge">
                    <i class="fas fa-user-graduate"></i>
                    <span>Sign Up</span>
                    <i class="fas fa-lock" style="margin-left: auto;"></i>
                </div>

                <!-- Main Role Selection -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-user-tag"></i> Select Main Role
                    </label>
                    <select id="mainRoleSelect" name="role" required>
                        <option value="" disabled selected>Select your main role</option>
                        <option value="Student">Student</option>
                        <option value="Staff">Staff</option>
                    </select>
                </div>
                <!-- Department Selection - Only for Students -->
                <div class="form-group dynamic-field" id="departmentGroup">
                    <label class="form-label">
                        <i class="fas fa-building"></i> Select Department
                    </label>
                    <select id="departmentSelect" name="department">
                        <option value="" disabled selected>Select your department</option>
                        <option value="CBME">CBME (Biomedical Engineering)</option>
                        <option value="SCBE">SCBE (Chemical Engineering)</option>
                        <option value="SCEE">SCEE (Civil Engineering)</option>
                        <option value="SECE">SECE (Electrical Engineering)</option>
                        <option value="SITE">SITE (Software Engineering)</option>
                        <option value="SMIE">SMIE (Mechanical Engineering)</option>
                    </select>
                </div>

                <!-- Staff Role Selection - Only for Staff -->
                <div class="form-group dynamic-field" id="staffRoleGroup">
                    <label class="form-label">
                        <i class="fas fa-briefcase"></i> Select Staff Role
                    </label>
                    <select id="staffRoleSelect" name="role">
                        <option value="" disabled selected>Select your staff role</option>
                        <option value="library">Library Staff</option>
                        <option value="registral">Registrar Office</option>
                        <option value="book_store">Book Store</option>
                        <option value="financial">Finance Office</option>
                        <option value="department_head">Department Head</option>
                        <option value="campus_police">Campus Police</option>
                        
                    </select>
                </div>

                <!-- Department Head Department Selection - Only when Department Head is selected -->
                <div class="form-group dynamic-field" id="deptHeadDepartmentGroup">
                    <label class="form-label">
                        <i class="fas fa-university"></i> Select Your Department (Department Head)
                    </label>
                    <select id="deptHeadDepartmentSelect" name="department">
                        <option value="" disabled selected>Select department you head</option>
                        <option value="CBME">CBME (Biomedical Engineering)</option>
                        <option value="SCBE">SCBE (Chemical Engineering)</option>
                        <option value="SCEE">SCEE (Civil Engineering)</option>
                        <option value="SECE">SECE (Electrical Engineering)</option>
                        <option value="SITE">SITE (Software Engineering)</option>
                        <option value="SMIE">SMIE (Mechanical Engineering)</option>
                    </select>
                </div>

                <!-- Name Field -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="fa-solid fa-user"></i> Full Name
                    </label>
                    <input type="text" name="name" id="name" placeholder="Enter your full name" required />
                </div>

                <!-- ID Field - Different placeholder based on role -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-id-badge"></i> ID Number
                    </label>
                    <input type="text" name="id" id="userId" placeholder="Enter your ID number" required />
                </div>

                <!-- Email Field -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input type="email" name="email" id="email" placeholder="xyz@aau.edu.et" required />
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-key"></i> Password
                    </label>
                    <input type="password" name="password" id="password" placeholder="Minimum 6 characters" required
                        minlength="6" />
                </div>

                <!-- Submit Button -->
                <button type="submit" id="sendOtpBtn">
                    <i class="fas fa-paper-plane"></i> Send OTP
                </button>
            </form>
            <!-- OTP FORM -->
            <form id="otpForm" style="display:none;">
                <div class="otp-header">
                    <div class="otp-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <h3>Verify Your Email</h3>
                </div>

                <p class="otp-info">
                    We've sent a 6-digit verification code to<br>
                    <strong id="userEmail"></strong>
                </p>

                <!-- OTP Input Digits -->
                <div class="otp-input-container">
                    <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-index="0" autofocus>
                    <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-index="1">
                    <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-index="2">
                    <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-index="3">
                    <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-index="4">
                    <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-index="5">
                </div>

                <!-- Hidden OTP Input for Form Submission -->
                <input type="hidden" id="otpInput">

                <!-- Timer -->
                <div class="otp-timer">
                    <span class="timer-text">Code expires in</span>
                    <span class="timer" id="otpTimer">02:00</span>
                </div>

                <!-- OTP Action Buttons -->
                <div class="otp-buttons">
                    <button type="submit" id="verifyBtn">
                        <i class="fas fa-check-circle"></i> Verify & Create Account
                    </button>

                    <button type="button" id="resendOtpBtn" disabled>
                        <i class="fas fa-redo"></i> Resend OTP (60s)
                    </button>

                    <button type="button" id="resetOtpBtn">
                        <i class="fas fa-undo"></i> Back to Sign Up
                    </button>
                </div>
            </form>

            <!-- Login Link -->
            <div class="login-link">
                Already registered?
                <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login to your account</a>
            </div>
        </div>
    </div>
</body>

</html>
