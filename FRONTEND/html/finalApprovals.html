<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Approvals | Registry Portal</title>
    <link rel="stylesheet" href="../css/pendingReq.css">
    <script src="../js/finalApprovals.js" type="module"></script>
</head>
<body>

    <div class="container">
        <header style="text-align: center; margin-bottom: 40px;">
            <h1 class="form-title">Final Approvals</h1>
            <p class="form-subtitle">Review requests ready for final registry approval</p>
        </header>

        <div id="requests-grid" class="requests-grid">
            <div id="loading-state" class="form-subtitle">Fetching requests ready for final approval...</div>
        </div>
    </div>

    <div id="rejection-modal" class="modal-overlay" style="display: none;">
        <div class="form-card">
            <h2 class="form-title">Reject Request</h2>
            <div class="warning-box">Please provide a reason for rejecting this document. This will be sent to the student.</div>
            
            <form id="rejection-form">
                <input type="hidden" id="reject-request-id">
                <label for="rejection-reason">Reason for Rejection</label>
                <textarea id="rejection-reason" placeholder="e.g. Missing signatures or incomplete documentation..." required></textarea>
                
                <div class="actions">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-ban" style="background: var(--danger);">Confirm Reject</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
