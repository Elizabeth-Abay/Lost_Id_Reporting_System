<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request New ID</title>
  <link rel = "stylesheet" href = "../css/requestNewId.css">
</head>
<body>

  <div class="card">
    <h1>Request New ID</h1>
    <p>Fill out this form to request a replacement student ID.</p>

    <form>
      <div class="form-group">
        <label for="studentId">Student ID</label>
        <input type="text" id="studentId" placeholder="e.g. STU-20491" required />
      </div>

      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="Your full name" required />
      </div>

      

      

      <div class="actions">
        <button type="submit">Submit Request</button>
      </div>

      <div class="warning">
        Please ensure your information is accurate to avoid delays.
      </div>
    </form>
  </div>

</body>
</html>
