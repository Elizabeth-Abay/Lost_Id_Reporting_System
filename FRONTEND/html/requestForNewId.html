<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request New ID</title>
  <link rel="stylesheet" href="../css/requestNewId.css">
  <script src="../js/requestNewIdLinker.js" type="module"></script>
  <script type="module" src="../js/requestingAccessFromRef.js"></script>

</head>

<body>

  <div class="card">
    <h1>Request New ID</h1>
    <p>Fill out this form to request a replacement student ID.</p>

    <form id="newIdForm">
      <div class="form-group">
        <label for="studentId">Student ID</label>
        <input type="text" id="studentId" placeholder="e.g. STU-20491" required />
      </div>

      <!-- <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="Your full name" required />
      </div> -->

      <div class="form-group">
        <label for="policeDocument">Upload Police Document</label>
        <input type="file" id="policeDocument" accept="image/*" required />
      </div>

      <div id="statusMessage" class="status-message"></div>

      <div class="actions">
        <button type="button" id="submitBtn">Submit Request</button>
      </div>

      <div class="warning">
        Please ensure your information is accurate to avoid delays.
      </div>
    </form>

  </div>

</body>

</html>
