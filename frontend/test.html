<!DOCTYPE html>
<html>
<head>
  <title>Backend Test</title>
</head>
<body>

<button onclick="sendData()">Send Data</button>

<script>
function sendData() {
  fetch("http://localhost:3000/test", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: "AAU Student",
      test: "Frontend to backend works"
    })
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);
  });
}
</script>

</body>
</html>
